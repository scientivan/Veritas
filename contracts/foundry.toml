[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 800
via_ir = false
ffi = true
fs_permissions = [{ access = "read-write", path = "./" }]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false

# Unichain Sepolia
[rpc_endpoints]
unichain_sepolia = "${UNICHAIN_SEPOLIA_RPC_URL}"

[etherscan]
unichain_sepolia = { key = "${UNISCAN_API_KEY}", url = "https://sepolia.uniscan.xyz/api" }
